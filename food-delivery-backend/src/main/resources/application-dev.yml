spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:food;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: sa
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    serialization:
      write-dates-as-timestamps: false
server:
  port: 8080
security:
  jwt:
    secret: food-delivery-secret-key-1234567890
    expire-ms: 86400000
