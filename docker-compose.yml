version: '3.9'
services:
  mysql:
    image: mysql:8.3
    environment:
      MYSQL_DATABASE: food_delivery
      MYSQL_USER: food
      MYSQL_PASSWORD: food
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: change-me
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
