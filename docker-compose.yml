version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: food-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: food_delivery
      MYSQL_USER: food
      MYSQL_PASSWORD: food
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./food-delivery-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./food-delivery-backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/data.sql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  backend:
    build: ./food-delivery-backend
    container_name: food-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  frontend:
    build: ./food-delivery-frontend
    container_name: food-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
